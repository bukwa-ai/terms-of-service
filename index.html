    background: var(--card);

    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 28px;
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  section.tos {
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    padding: 22px 28px;
    margin-bottom: 16px;
  }

    font-size: 20px;
    margin: 0 0 12px;
    display: flex; gap: 10px; align-items: baseline;
  }

  section.tos h3 { font-size: 16px; margin: 18px 0 6px; color: var(--ink); }
  section.tos p { margin: 0 0 10px; color: var(--ink-soft); line-height: 1.6; font-size: 15px; }
  section.tos ul { margin: 0 0 10px 22px; color: var(--ink-soft); line-height: 1.6; font-size: 15px; }
  section.tos ul li { margin-bottom: 4px; }
  section.tos a { color: var(--ink); font-weight: 600; }
  .contact {

    border: 1.5px dashed var(--ink); border-radius: 14px; background: var(--card);

  .contact p { margin: 6px 0; color: var(--ink-soft); }
  .contact a { color: var(--ink); font-weight: 700; }
  footer { margin-top: 56px; text-align: center; color: var(--muted); font-size: 14px; font-style: italic; }
  @media (prefers-color-scheme: dark) {

      { h: "12. Vyloučení záruk", body: `<p><strong>Aplikace je poskytována „jak stojí a leží" a „jak je dostupná", bez záruk jakéhokoli druhu, výslovných nebo předpokládaných, včetně, ale nikoli výhradně, předpokládaných záruk obchodovatelnosti, vhodnosti pro konkrétní účel a neporušení práv. Nezaručujeme, že Aplikace bude nepřerušená, bezchybná nebo bezpečná.</strong></p>` },
      { h: "13. Omezení odpovědnosti", body: `<p><strong>V maximálním rozsahu povoleném zákonem nebude Vývojář odpovídat za žádné nepřímé, náhodné, zvláštní, následné ani trestní škody, ani za ztrátu zisku, dat nebo dobrého jména vzniklé v souvislosti s vaším používáním Aplikace. Naše celková odpovědnost nepřekročí částku, kterou jste za Aplikaci zaplatili během dvanácti (12) měsíců předcházejících nároku.</strong></p>` },
      { h: "14. Dostupnost služby", body: `<p>Vyhrazujeme si právo Aplikaci nebo její jakoukoli část kdykoli upravit, pozastavit nebo ukončit, s upozorněním nebo bez něj. V případě ukončení služby obdrží aktivní předplatitelé poměrnou náhradu za nevyužitou část svého předplatného.</p>` },
      { h: "15. Změny těchto Podmínek", body: `<p>Tyto Podmínky můžeme čas od času aktualizovat. O významných změnách vás budeme informovat prostřednictvím Aplikace nebo jinými přiměřenými prostředky. Pokračování v používání Aplikace po zveřejnění změn představuje vaše přijetí revidovaných Podmínek.</p>` },
      { h: "16. Licenční smlouva s koncovým uživatelem", body: `<p>Používání Aplikace také podléhá Standardní licenční smlouvě s koncovým uživatelem (EULA) společnosti Apple, dostupné na <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">apple.com/legal/.../stdeula</a>.</p>` }

  fr: {
    name: "Français",
    title: "Conditions d'utilisation",
    subtitle: "Bukwa — Histoires IA pour l'apprentissage des langues",
    updated: "Dernière mise à jour : 2 mai 2026",
    intro: `Les présentes Conditions d'utilisation (« Conditions ») régissent votre utilisation de l'application mobile Bukwa (« Application ») fournie par Oleksandr (« Développeur », « nous », « notre » ou « nos »). En téléchargeant, installant ou utilisant l'Application, vous acceptez d'être lié par ces Conditions. Si vous n'acceptez pas ces Conditions, n'utilisez pas l'Application.`,
    sections: [
      { h: "1. Description du service", body: `<p>Bukwa est une application d'apprentissage des langues qui permet aux utilisateurs de créer des vocabulaires, de générer des histoires propulsées par l'IA avec des glossaires intégrés, de s'entraîner avec des cartes mémoire et de traduire des mots grâce à l'intelligence artificielle. L'Application prend en charge plus de 30 langues.</p>` },
      { h: "2. Éligibilité", body: `<p>Vous devez avoir au moins 4 ans pour utiliser l'Application. Si vous avez moins de 18 ans, vous devez obtenir le consentement d'un parent ou d'un tuteur légal.</p>` },
      { h: "3. Inscription du compte", body: `<p>Pour accéder à certaines fonctionnalités de l'Application, vous devez créer un compte via Apple Sign-In. Vous êtes responsable de la confidentialité de vos identifiants et de toutes les activités effectuées sous votre compte.</p>` },
      { h: "4. Abonnements et achats", body: `
        <h3>4.1 Formules d'abonnement</h3>
        <p>Bukwa propose des formules d'abonnement à renouvellement automatique qui offrent un accès complet aux fonctionnalités de l'Application, y compris la génération d'histoires par IA, les traductions par IA, les transcriptions IPA et la révision par cartes mémoire. Les tarifs et formules actuels sont consultables dans l'Application et sur la page produit de l'App Store.</p>
        <h3>4.2 Essai gratuit</h3>
        <p>Les nouveaux abonnés peuvent être éligibles à une période d'essai gratuite. Si vous n'annulez pas avant la fin de l'essai, la formule d'abonnement sélectionnée vous sera automatiquement facturée.</p>
        <h3>4.3 Achats intégrés</h3>
        <p>Bukwa propose des Story Packs consommables qui fournissent un nombre défini de crédits pour des histoires générées par IA. L'achat et l'utilisation des Story Packs nécessitent un abonnement actif. Si l'abonnement expire, les crédits inutilisés sont gelés et redeviennent disponibles lors du réabonnement. Les crédits n'expirent pas tant que l'abonnement est actif.</p>
        <h3>4.4 Paiement et renouvellement</h3>
        <p>Le paiement est débité de votre compte Apple ID à la confirmation de l'achat. Les abonnements se renouvellent automatiquement sauf annulation au moins 24 heures avant la fin de la période en cours. Votre compte sera débité du renouvellement dans les 24 heures précédant la fin de la période en cours au tarif de la formule sélectionnée.</p>
        <h3>4.5 Gestion et annulation des abonnements</h3>
        <p>Vous pouvez gérer ou annuler votre abonnement à tout moment via les paramètres de votre compte Apple ID ou l'App Store. L'annulation prend effet à la fin de la période de facturation en cours. Aucun remboursement n'est accordé pour la portion inutilisée d'une période d'abonnement.</p>
        <h3>4.6 Modifications des tarifs</h3>
        <p>Les tarifs peuvent être modifiés. Nous vous informerons à l'avance de tout changement de tarif. La poursuite de l'utilisation de l'Application après un changement de tarif constitue une acceptation du nouveau prix.</p>
      ` },
      { h: "5. Limites d'utilisation", body: `
        <p>Afin de garantir un usage équitable et la qualité du service, l'Application applique des limites d'utilisation quotidiennes aux fonctionnalités propulsées par IA, notamment la génération d'histoires, les traductions et les transcriptions. Les limites actuelles sont affichées dans l'Application.</p>
        <p>Les limites d'utilisation se réinitialisent 24 heures après la première utilisation d'une fonctionnalité donnée. Par exemple, si vous générez votre première histoire à 20h00, votre limite d'histoires se réinitialise à 20h00 le lendemain. Les crédits inutilisés ne sont pas reportés.</p>
      ` },
      { h: "6. Contenu généré par IA", body: `
        <h3>6.1 Nature du contenu</h3>
        <p>Les histoires, traductions et transcriptions sont générées par des services IA tiers. Le contenu généré par IA peut contenir des inexactitudes, des erreurs ou des résultats inattendus. Nous ne garantissons pas l'exactitude, l'exhaustivité ou l'adéquation du contenu généré par IA à un usage particulier.</p>
        <h3>6.2 Aucun contrôle éditorial</h3>
        <p>Nous ne vérifions pas manuellement chaque élément de contenu généré par IA. Bien que nous concevions les prompts et systèmes pour produire un contenu approprié et utile, le Développeur n'est pas responsable des sorties spécifiques générées par les modèles IA.</p>
        <h3>6.3 Usage pédagogique uniquement</h3>
        <p>Le contenu généré par IA est destiné uniquement à l'apprentissage des langues et ne doit pas être considéré comme une source définitive d'informations linguistiques, factuelles ou professionnelles.</p>
      ` },
      { h: "7. Contenu et données de l'utilisateur", body: `
        <h3>7.1 Vos données</h3>
        <p>Vous conservez la propriété des vocabulaires, listes de mots, histoires et autres contenus que vous créez dans l'Application. Tout le contenu créé par l'utilisateur est stocké localement sur votre appareil.</p>
        <h3>7.2 Données côté serveur</h3>
        <p>L'Application stocke les données suivantes sur nos serveurs : vos informations d'authentification (nom et e-mail fournis via Apple Sign-In), le statut de l'abonnement, les limites d'utilisation et un cache des traductions et transcriptions de mots pour améliorer les performances. Nous ne stockons pas vos vocabulaires, histoires ou autres contenus d'apprentissage sur nos serveurs.</p>
        <h3>7.3 Confidentialité</h3>
        <p>Votre utilisation de l'Application est également régie par notre <a href="https://bukwa-ai.github.io/privacy-policy/">Politique de confidentialité</a>.</p>
        <h3>7.4 Suppression des données</h3>
        <p>Vos vocabulaires, histoires et tout contenu d'apprentissage sont stockés localement sur votre appareil et supprimés lorsque vous désinstallez l'Application ou les supprimez manuellement. Pour demander la suppression de vos données côté serveur (informations d'authentification, statut d'abonnement et limites d'utilisation), veuillez nous contacter à <a href="mailto:bukwa.ai@icloud.com">bukwa.ai@icloud.com</a>. Les données côté serveur seront supprimées dans les 30 jours suivant votre demande.</p>
      ` },
      { h: "8. Usage acceptable", body: `
        <p>Vous acceptez de ne pas :</p>
        <ul>
          <li>utiliser l'Application à des fins illégales ;</li>
          <li>tenter de rétro-concevoir, décompiler ou désassembler l'Application ;</li>
          <li>interférer avec ou perturber la fonctionnalité de l'Application ou ses serveurs ;</li>
          <li>utiliser des outils automatisés, bots ou scripts pour accéder à l'Application au-delà de l'usage normal ;</li>
          <li>tenter de contourner les limites d'utilisation ou les exigences d'abonnement ;</li>
          <li>revendre, redistribuer ou exploiter commercialement l'Application ou son contenu ;</li>
        </ul>
      ` },
      { h: "9. Contenu interdit", body: `
        <p>Vous vous engagez à ne pas utiliser l\'Application, y compris ses fonctions d\'histoires et de traduction par IA, pour générer, demander, stocker ou partager du contenu qui :</p>
        <ul>
          <li>sexualise des mineurs de quelque manière que ce soit ou représente des matériels d\'abus sexuel sur enfants (CSAM) — tolérance zéro pour cette catégorie ;</li>
          <li>contient du contenu sexuel explicite, de la pornographie ou de la nudité graphique ;</li>
          <li>promeut, glorifie ou fournit des instructions pour la violence, l\'automutilation, le suicide ou le terrorisme ;</li>
          <li>promeut la haine, le harcèlement ou la discrimination contre tout individu ou groupe sur la base de la race, l\'ethnie, la religion, le genre, l\'orientation sexuelle, le handicap ou autre caractéristique protégée ;</li>
          <li>fournit des instructions pour des activités illégales, y compris la fabrication d\'armes, de drogues ou autres substances contrôlées ;</li>
          <li>enfreint les droits de propriété intellectuelle, de confidentialité ou de publicité de tiers ;</li>
          <li>est diffamatoire, trompeur, frauduleux ou destiné à usurper l\'identité d\'autrui.</li>
        </ul>
        <p>L\'Application applique un filtrage automatique du contenu (via l\'API Moderation d\'OpenAI) sur les mots fournis par l\'utilisateur avant de générer des histoires, et les modèles d\'IA sous-jacents reçoivent des instructions pour rediriger le vocabulaire sensible vers des contextes neutres et éducatifs. Cependant, aucun filtre automatisé n\'est parfait.</p>
        <p><strong>Signalement :</strong> Si vous rencontrez du contenu que vous estimez contraire à ces Conditions, signalez-le via l\'option Report dans l\'application ou par e-mail à <a href="mailto:bukwa.ai@icloud.com">bukwa.ai@icloud.com</a>. Nous visons à répondre aux signalements dans les 24 heures.</p>
        <p><strong>Application :</strong> Nous nous réservons le droit, sans en avoir l\'obligation, de surveiller, examiner, supprimer ou refuser de générer tout contenu qui viole ces Conditions. Les utilisateurs qui violent à plusieurs reprises cette politique de Contenu interdit pourront voir leur compte suspendu ou résilié sans remboursement.</p>
      ` },
      { h: "10. Propriété intellectuelle", body: `
        <h3>9.1 Propriété de l'Application</h3>
        <p>L'Application, y compris son design, son code, ses fonctionnalités et son image de marque, est la propriété intellectuelle du Développeur et est protégée par le droit d'auteur et d'autres lois sur la propriété intellectuelle.</p>
        <h3>9.2 Licence du contenu IA</h3>
        <p>Les histoires et traductions générées par IA produites via votre utilisation de l'Application sont fournies pour votre usage personnel et non commercial. Vous pouvez enregistrer et partager les histoires générées pour votre compte, mais vous ne pouvez pas les distribuer commercialement ni les publier à grande échelle.</p>
      ` },
      { h: "11. Services tiers", body: `<p>L'Application s'appuie sur des services tiers pour la génération de contenu IA, l'authentification et le stockage des données. La disponibilité et les performances de ces services échappent à notre contrôle. Nous ne sommes pas responsables des interruptions, erreurs ou limitations causées par des services tiers.</p>` },
      { h: "12. Exclusion de garanties", body: `<p><strong>L'Application est fournie « en l'état » et « selon disponibilité », sans garantie d'aucune sorte, expresse ou implicite, y compris, mais sans s'y limiter, les garanties implicites de qualité marchande, d'adéquation à un usage particulier et de non-contrefaçon. Nous ne garantissons pas que l'Application sera ininterrompue, sans erreur ou sécurisée.</strong></p>` },
      { h: "13. Limitation de responsabilité", body: `<p><strong>Dans toute la mesure permise par la loi, le Développeur ne sera pas responsable des dommages indirects, accessoires, spéciaux, consécutifs ou punitifs, ni de toute perte de profits, de données ou de fonds de commerce, résultant de ou en lien avec votre utilisation de l'Application. Notre responsabilité totale n'excédera pas le montant que vous avez payé pour l'Application au cours des douze (12) mois précédant la réclamation.</strong></p>` },
      { h: "14. Disponibilité du service", body: `<p>Nous nous réservons le droit de modifier, suspendre ou interrompre l'Application ou toute partie de celle-ci à tout moment, avec ou sans préavis. En cas d'interruption du service, les abonnés actifs recevront un remboursement au prorata de la partie inutilisée de leur abonnement.</p>` },
      { h: "15. Modifications des présentes Conditions", body: `<p>Nous pouvons mettre à jour ces Conditions de temps à autre. Nous vous informerons des modifications substantielles via l'Application ou par d'autres moyens raisonnables. Votre utilisation continue de l'Application après la publication des modifications constitue votre acceptation des Conditions révisées.</p>` },
      { h: "16. Contrat de licence utilisateur final", body: `<p>L'utilisation de l'Application est également soumise au Contrat de licence utilisateur final standard (EULA) d'Apple, disponible à l'adresse <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">apple.com/legal/.../stdeula</a>.</p>` }
    ],

    contactIntro: "Si vous avez des questions concernant ces Conditions, veuillez nous contacter à :",

  de: {
    name: "Deutsch",
    title: "Nutzungsbedingungen",
    subtitle: "Bukwa — KI-Geschichten zum Sprachenlernen",
    updated: "Letzte Aktualisierung: 2. Mai 2026",
    intro: `Diese Nutzungsbedingungen („Bedingungen") regeln Ihre Nutzung der mobilen Anwendung Bukwa („App"), bereitgestellt von Oleksandr („Entwickler", „wir", „uns" oder „unser"). Mit dem Herunterladen, Installieren oder Verwenden der App erklären Sie sich damit einverstanden, an diese Bedingungen gebunden zu sein. Wenn Sie mit diesen Bedingungen nicht einverstanden sind, verwenden Sie die App nicht.`,
    sections: [
      { h: "1. Beschreibung des Dienstes", body: `<p>Bukwa ist eine Sprachlern-App, mit der Nutzer Vokabellisten erstellen, KI-gestützte Geschichten mit integrierten Glossaren generieren, mit Karteikarten üben und Wörter mithilfe künstlicher Intelligenz übersetzen können. Die App unterstützt über 30 Sprachen.</p>` },
      { h: "2. Teilnahmeberechtigung", body: `<p>Sie müssen mindestens 4 Jahre alt sein, um die App zu nutzen. Wenn Sie unter 18 Jahre alt sind, benötigen Sie die Zustimmung eines Elternteils oder gesetzlichen Vormunds.</p>` },
      { h: "3. Kontoregistrierung", body: `<p>Um auf bestimmte Funktionen der App zugreifen zu können, müssen Sie ein Konto mit Apple Sign-In erstellen. Sie sind für die Vertraulichkeit Ihrer Zugangsdaten und für alle Aktivitäten verantwortlich, die unter Ihrem Konto stattfinden.</p>` },
      { h: "4. Abonnements und Käufe", body: `
        <h3>4.1 Abonnementpläne</h3>
        <p>Bukwa bietet automatisch verlängerbare Abonnementpläne, die vollen Zugriff auf die Funktionen der App bieten, einschließlich KI-Geschichtenerstellung, KI-Übersetzungen, IPA-Transkriptionen und Karteikartenwiederholung. Aktuelle Preise und verfügbare Pläne können in der App und auf der App Store-Produktseite eingesehen werden.</p>
        <h3>4.2 Kostenlose Testphase</h3>
        <p>Neue Abonnenten können Anspruch auf eine kostenlose Testphase haben. Wenn Sie nicht vor Ablauf der Testphase kündigen, wird Ihnen der ausgewählte Abonnementplan automatisch in Rechnung gestellt.</p>
        <h3>4.3 In-App-Käufe</h3>
        <p>Bukwa bietet verbrauchbare Story Packs an, die eine festgelegte Anzahl von KI-Geschichtenguthaben bereitstellen. Für den Kauf und die Nutzung von Story Packs ist ein aktives Abonnement erforderlich. Läuft das Abonnement ab, werden nicht verwendete Guthaben eingefroren und stehen bei Wiederaufnahme erneut zur Verfügung. Solange das Abonnement aktiv ist, verfallen die Guthaben nicht.</p>
        <h3>4.4 Zahlung und Verlängerung</h3>
        <p>Die Zahlung wird bei Kaufbestätigung von Ihrem Apple-ID-Konto abgebucht. Abonnements verlängern sich automatisch, sofern sie nicht mindestens 24 Stunden vor Ende des aktuellen Zeitraums gekündigt werden. Ihr Konto wird innerhalb von 24 Stunden vor Ende des aktuellen Zeitraums mit den Kosten des ausgewählten Plans für die Verlängerung belastet.</p>
        <h3>4.5 Verwaltung und Kündigung von Abonnements</h3>
        <p>Sie können Ihr Abonnement jederzeit über die Einstellungen Ihres Apple-ID-Kontos oder den App Store verwalten oder kündigen. Die Kündigung wird zum Ende des aktuellen Abrechnungszeitraums wirksam. Für den ungenutzten Teil eines Abonnementzeitraums werden keine Rückerstattungen gewährt.</p>
        <h3>4.6 Preisänderungen</h3>
        <p>Die Preise können sich ändern. Wir werden Sie über Preisänderungen im Voraus informieren. Die fortgesetzte Nutzung der App nach einer Preisänderung stellt Ihre Zustimmung zu den neuen Preisen dar.</p>
      ` },
      { h: "5. Nutzungslimits", body: `
        <p>Um eine faire Nutzung und Servicequalität zu gewährleisten, setzt die App tägliche Nutzungslimits für KI-gestützte Funktionen durch, einschließlich Geschichtenerstellung, Übersetzungen und Transkriptionen. Die aktuellen Limits werden in der App angezeigt.</p>
        <p>Die Nutzungslimits werden 24 Stunden nach der ersten Verwendung einer bestimmten Funktion zurückgesetzt. Wenn Sie beispielsweise Ihre erste Geschichte um 20:00 Uhr generieren, wird Ihr Geschichtenlimit am nächsten Tag um 20:00 Uhr zurückgesetzt. Ungenutzte Kontingente werden nicht übertragen.</p>
      ` },
      { h: "6. KI-generierte Inhalte", body: `
        <h3>6.1 Art der Inhalte</h3>
        <p>Geschichten, Übersetzungen und Transkriptionen werden von KI-Diensten Dritter generiert. KI-generierte Inhalte können Ungenauigkeiten, Fehler oder unerwartete Ergebnisse enthalten. Wir garantieren nicht die Genauigkeit, Vollständigkeit oder Eignung von KI-generierten Inhalten für einen bestimmten Zweck.</p>
        <h3>6.2 Keine redaktionelle Kontrolle</h3>
        <p>Wir prüfen nicht jedes einzelne Stück KI-generierter Inhalte manuell. Obwohl wir Prompts und Systeme so gestalten, dass sie angemessene und nützliche Inhalte erzeugen, ist der Entwickler nicht verantwortlich für die spezifischen Ausgaben, die von KI-Modellen erzeugt werden.</p>
        <h3>6.3 Nur zu Bildungszwecken</h3>
        <p>KI-generierte Inhalte sind ausschließlich für das Sprachenlernen bestimmt und sollten nicht als endgültige Quelle für sprachliche, sachliche oder fachliche Informationen angesehen werden.</p>
      ` },
      { h: "7. Nutzerinhalte und Daten", body: `
        <h3>7.1 Ihre Daten</h3>
        <p>Sie behalten das Eigentum an den Vokabellisten, Wortlisten, Geschichten und anderen Inhalten, die Sie in der App erstellen. Alle vom Nutzer erstellten Inhalte werden lokal auf Ihrem Gerät gespeichert.</p>
        <h3>7.2 Serverseitige Daten</h3>
        <p>Die App speichert die folgenden Daten auf unseren Servern: Ihre Authentifizierungsinformationen (Name und E-Mail, die über Apple Sign-In bereitgestellt werden), Abonnementstatus, Nutzungslimits und einen Cache von Wortübersetzungen und Transkriptionen zur Leistungsverbesserung. Wir speichern Ihre Vokabellisten, Geschichten oder andere Lerninhalte nicht auf unseren Servern.</p>
        <h3>7.3 Datenschutz</h3>
        <p>Ihre Nutzung der App unterliegt auch unserer <a href="https://bukwa-ai.github.io/privacy-policy/">Datenschutzerklärung</a>.</p>
        <h3>7.4 Datenlöschung</h3>
        <p>Ihre Vokabellisten, Geschichten und alle Lerninhalte werden lokal auf Ihrem Gerät gespeichert und gelöscht, wenn Sie die App entfernen oder sie manuell in der App löschen. Um die Löschung Ihrer serverseitigen Daten (Authentifizierungsinformationen, Abonnementstatus und Nutzungslimits) zu beantragen, kontaktieren Sie uns bitte unter <a href="mailto:bukwa.ai@icloud.com">bukwa.ai@icloud.com</a>. Serverseitige Daten werden innerhalb von 30 Tagen nach Ihrer Anfrage entfernt.</p>
      ` },
      { h: "8. Akzeptable Nutzung", body: `
        <p>Sie verpflichten sich, Folgendes nicht zu tun:</p>
        <ul>
          <li>die App für rechtswidrige Zwecke zu verwenden;</li>
          <li>zu versuchen, die App zurückzuentwickeln, zu dekompilieren oder zu disassemblieren;</li>
          <li>die Funktionalität der App oder der Server zu stören oder zu beeinträchtigen;</li>
          <li>automatisierte Tools, Bots oder Skripte zu verwenden, um über die normale Nutzung hinaus auf die App zuzugreifen;</li>
          <li>zu versuchen, Nutzungslimits oder Abonnementanforderungen zu umgehen;</li>
          <li>die App oder ihre Inhalte weiterzuverkaufen, weiterzuverbreiten oder kommerziell zu nutzen;</li>
        </ul>
      ` },
      { h: "9. Verbotene Inhalte", body: `
        <p>Sie stimmen zu, die App, einschließlich ihrer KI-gestützten Geschichten- und Übersetzungsfunktionen, nicht zu verwenden, um Inhalte zu generieren, anzufordern, zu speichern oder zu teilen, die:</p>
        <ul>
          <li>Minderjährige in irgendeiner Weise sexualisieren oder Material über sexuellen Missbrauch von Kindern (CSAM) darstellen — für diese Kategorie gilt Null-Toleranz;</li>
          <li>expliziten sexuellen Inhalt, Pornografie oder grafische Nacktheit enthalten;</li>
          <li>Gewalt, Selbstverletzung, Selbstmord oder Terrorismus fördern, verherrlichen oder Anweisungen dazu geben;</li>
          <li>Hass, Belästigung oder Diskriminierung gegen Einzelpersonen oder Gruppen aufgrund von Rasse, ethnischer Zugehörigkeit, Religion, Geschlecht, sexueller Orientierung, Behinderung oder anderen geschützten Merkmalen fördern;</li>
          <li>Anweisungen für illegale Aktivitäten geben, einschließlich der Herstellung von Waffen, Drogen oder anderen kontrollierten Substanzen;</li>
          <li>die Rechte am geistigen Eigentum, an der Privatsphäre oder am Recht am eigenen Bild Dritter verletzen;</li>
          <li>verleumderisch, irreführend, betrügerisch sind oder dazu dienen, eine andere Person zu imitieren.</li>
        </ul>
        <p>Die App wendet automatische Inhaltsfilterung (über OpenAI\'s Moderation API) auf vom Nutzer bereitgestellte Vokabeln an, bevor Geschichten generiert werden, und die zugrunde liegenden KI-Modelle werden angewiesen, sensible Vokabeln in neutrale, pädagogische Kontexte umzuleiten. Allerdings ist kein automatisierter Filter perfekt.</p>
        <p><strong>Meldung:</strong> Wenn Sie auf Inhalte stoßen, die Ihrer Meinung nach gegen diese Bedingungen verstoßen, melden Sie diese über die Report-Option in der App oder per E-Mail an <a href="mailto:bukwa.ai@icloud.com">bukwa.ai@icloud.com</a>. Wir bemühen uns, auf Meldungen innerhalb von 24 Stunden zu antworten.</p>
        <p><strong>Durchsetzung:</strong> Wir behalten uns das Recht vor, jedoch ohne Verpflichtung, Inhalte, die gegen diese Bedingungen verstoßen, zu überwachen, zu prüfen, zu entfernen oder die Generierung zu verweigern. Benutzer, die wiederholt gegen diese Richtlinie für verbotene Inhalte verstoßen, können ohne Erstattung gesperrt oder gekündigt werden.</p>
      ` },
      { h: "10. Geistiges Eigentum", body: `
        <h3>9.1 Eigentum an der App</h3>
        <p>Die App, einschließlich ihres Designs, Codes, ihrer Funktionen und ihres Brandings, ist geistiges Eigentum des Entwicklers und durch Urheberrechte und andere Gesetze zum Schutz des geistigen Eigentums geschützt.</p>
        <h3>9.2 Lizenz für KI-Inhalte</h3>
        <p>Von der KI generierte Geschichten und Übersetzungen, die durch Ihre Nutzung der App erzeugt werden, werden Ihnen für Ihren persönlichen, nicht kommerziellen Gebrauch zur Verfügung gestellt. Sie dürfen Geschichten, die für Ihr Konto erstellt wurden, speichern und teilen, dürfen sie jedoch nicht kommerziell verbreiten oder in großem Umfang veröffentlichen.</p>
      ` },
      { h: "11. Dienste Dritter", body: `<p>Die App nutzt Dienste Dritter für die Erstellung von KI-Inhalten, die Authentifizierung und die Datenspeicherung. Die Verfügbarkeit und Leistung dieser Dienste liegen außerhalb unserer Kontrolle. Wir sind nicht verantwortlich für Unterbrechungen, Fehler oder Einschränkungen, die durch Dienste Dritter verursacht werden.</p>` },
      { h: "12. Haftungsausschluss", body: `<p><strong>Die App wird „wie besehen" und „wie verfügbar" ohne jegliche ausdrückliche oder stillschweigende Gewährleistung bereitgestellt, einschließlich, aber nicht beschränkt auf stillschweigende Gewährleistungen der Marktgängigkeit, der Eignung für einen bestimmten Zweck und der Nichtverletzung von Rechten. Wir gewährleisten nicht, dass die App ununterbrochen, fehlerfrei oder sicher sein wird.</strong></p>` },
      { h: "13. Haftungsbeschränkung", body: `<p><strong>Soweit gesetzlich zulässig, haftet der Entwickler nicht für indirekte, zufällige, besondere, Folge- oder Strafschäden oder für entgangenen Gewinn, Datenverlust oder Verlust des Firmenwerts, die sich aus oder in Verbindung mit Ihrer Nutzung der App ergeben. Unsere Gesamthaftung übersteigt nicht den Betrag, den Sie in den zwölf (12) Monaten vor dem Anspruch für die App bezahlt haben.</strong></p>` },
      { h: "14. Verfügbarkeit des Dienstes", body: `<p>Wir behalten uns das Recht vor, die App oder Teile davon jederzeit mit oder ohne Vorankündigung zu ändern, auszusetzen oder einzustellen. Im Falle einer Einstellung des Dienstes erhalten aktive Abonnenten eine anteilige Rückerstattung für den ungenutzten Teil ihres Abonnements.</p>` },
      { h: "15. Änderungen dieser Bedingungen", body: `<p>Wir können diese Bedingungen von Zeit zu Zeit aktualisieren. Über wesentliche Änderungen informieren wir Sie über die App oder andere angemessene Mittel. Ihre fortgesetzte Nutzung der App nach Veröffentlichung von Änderungen gilt als Ihre Zustimmung zu den überarbeiteten Bedingungen.</p>` },
      { h: "16. Endbenutzer-Lizenzvereinbarung", body: `<p>Die Nutzung der App unterliegt außerdem der Standard-Endbenutzer-Lizenzvereinbarung (EULA) von Apple, verfügbar unter <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">apple.com/legal/.../stdeula</a>.</p>` }

  it: {
    name: "Italiano",
    title: "Termini di servizio",
    subtitle: "Bukwa — Storie IA per l'apprendimento delle lingue",
    updated: "Ultimo aggiornamento: 2 maggio 2026",
    intro: `I presenti Termini di servizio (i "Termini") regolano l'uso dell'applicazione mobile Bukwa (l'"App") fornita da Oleksandr ("Sviluppatore", "noi", "ci" o "nostro"). Scaricando, installando o utilizzando l'App, accetti di essere vincolato dai presenti Termini. Se non accetti questi Termini, non utilizzare l'App.`,
    sections: [
      { h: "1. Descrizione del servizio", body: `<p>Bukwa è un'applicazione per l'apprendimento delle lingue che consente agli utenti di creare vocabolari, generare storie con IA e glossari integrati, esercitarsi con flashcard e tradurre parole tramite intelligenza artificiale. L'App supporta oltre 30 lingue.</p>` },
      { h: "2. Idoneità", body: `<p>Devi avere almeno 4 anni per utilizzare l'App. Se hai meno di 18 anni, devi avere il consenso di un genitore o tutore legale.</p>` },
      { h: "3. Registrazione dell'account", body: `<p>Per accedere a determinate funzionalità dell'App, devi creare un account utilizzando Apple Sign-In. Sei responsabile della riservatezza delle credenziali del tuo account e di tutte le attività che si svolgono con esso.</p>` },
      { h: "4. Abbonamenti e acquisti", body: `
        <h3>4.1 Piani di abbonamento</h3>
        <p>Bukwa offre piani di abbonamento a rinnovo automatico che forniscono accesso completo alle funzionalità dell'App, tra cui generazione di storie con IA, traduzioni IA, trascrizioni IPA e revisione con flashcard. I prezzi correnti e i piani disponibili sono consultabili all'interno dell'App e sulla pagina del prodotto sull'App Store.</p>
        <h3>4.2 Prova gratuita</h3>
        <p>I nuovi abbonati possono avere diritto a un periodo di prova gratuito. Se non annulli prima della fine della prova, ti verrà addebitato automaticamente il piano di abbonamento selezionato.</p>
        <h3>4.3 Acquisti in-app</h3>
        <p>Bukwa offre Story Pack consumabili che forniscono un numero stabilito di crediti per storie generate dall'IA. Gli Story Pack richiedono un abbonamento attivo per essere acquistati e utilizzati. Se l'abbonamento scade, i crediti non utilizzati vengono congelati e tornano disponibili al rinnovo dell'abbonamento. I crediti non scadono mentre l'abbonamento è attivo.</p>
        <h3>4.4 Pagamento e rinnovo</h3>
        <p>Il pagamento viene addebitato sul tuo account Apple ID al momento della conferma dell'acquisto. Gli abbonamenti si rinnovano automaticamente a meno che non vengano annullati almeno 24 ore prima della fine del periodo corrente. Il tuo account verrà addebitato per il rinnovo entro 24 ore prima della fine del periodo corrente al costo del piano selezionato.</p>
        <h3>4.5 Gestione e annullamento degli abbonamenti</h3>
        <p>Puoi gestire o annullare il tuo abbonamento in qualsiasi momento tramite le impostazioni del tuo account Apple ID o l'App Store. L'annullamento ha effetto al termine del periodo di fatturazione corrente. Non sono previsti rimborsi per la parte non utilizzata di un periodo di abbonamento.</p>
        <h3>4.6 Modifiche ai prezzi</h3>
        <p>I prezzi sono soggetti a modifiche. Ti notificheremo in anticipo eventuali variazioni. L'uso continuato dell'App dopo una modifica dei prezzi costituisce accettazione del nuovo prezzo.</p>
      ` },
      { h: "5. Limiti di utilizzo", body: `
        <p>Per garantire un uso equo e la qualità del servizio, l'App applica limiti di utilizzo giornalieri sulle funzionalità basate sull'IA, tra cui generazione di storie, traduzioni e trascrizioni. I limiti correnti sono visualizzati nell'App.</p>
        <p>I limiti di utilizzo si reimpostano 24 ore dopo il primo uso di una determinata funzionalità. Ad esempio, se generi la tua prima storia alle 20:00, il limite delle storie si reimposta alle 20:00 del giorno successivo. I crediti non utilizzati non vengono riportati.</p>
      ` },
      { h: "6. Contenuti generati dall'IA", body: `
        <h3>6.1 Natura dei contenuti</h3>
        <p>Storie, traduzioni e trascrizioni sono generate da servizi IA di terze parti. I contenuti generati dall'IA possono contenere imprecisioni, errori o risultati inaspettati. Non garantiamo l'accuratezza, la completezza o l'idoneità dei contenuti generati dall'IA per scopi particolari.</p>
        <h3>6.2 Nessun controllo editoriale</h3>
        <p>Non revisioniamo manualmente ogni contenuto generato dall'IA. Sebbene progettiamo prompt e sistemi per produrre contenuti appropriati e utili, lo Sviluppatore non è responsabile dei singoli output generati dai modelli IA.</p>
        <h3>6.3 Solo per uso didattico</h3>
        <p>I contenuti generati dall'IA sono destinati esclusivamente all'apprendimento delle lingue e non devono essere considerati una fonte definitiva di informazioni linguistiche, fattuali o professionali.</p>
      ` },
      { h: "7. Contenuti e dati dell'utente", body: `
        <h3>7.1 I tuoi dati</h3>
        <p>Mantieni la proprietà di vocabolari, liste di parole, storie e altri contenuti che crei nell'App. Tutti i contenuti creati dall'utente sono memorizzati localmente sul tuo dispositivo.</p>
        <h3>7.2 Dati lato server</h3>
        <p>L'App memorizza i seguenti dati sui nostri server: le tue informazioni di autenticazione (nome ed e-mail forniti tramite Apple Sign-In), stato dell'abbonamento, limiti di utilizzo e una cache di traduzioni e trascrizioni di parole per migliorare le prestazioni. Non memorizziamo i tuoi vocabolari, storie o altri contenuti di apprendimento sui nostri server.</p>
        <h3>7.3 Privacy</h3>
        <p>L'uso dell'App è inoltre regolato dalla nostra <a href="https://bukwa-ai.github.io/privacy-policy/">Informativa sulla privacy</a>.</p>
        <h3>7.4 Eliminazione dei dati</h3>
        <p>I tuoi vocabolari, storie e tutti i contenuti di apprendimento sono memorizzati localmente sul tuo dispositivo e vengono eliminati quando rimuovi l'App o li elimini manualmente al suo interno. Per richiedere l'eliminazione dei tuoi dati lato server (informazioni di autenticazione, stato dell'abbonamento e limiti di utilizzo), contattaci all'indirizzo <a href="mailto:bukwa.ai@icloud.com">bukwa.ai@icloud.com</a>. I dati lato server saranno rimossi entro 30 giorni dalla tua richiesta.</p>
      ` },
      { h: "8. Uso accettabile", body: `
        <p>Accetti di non:</p>
        <ul>
          <li>utilizzare l'App per scopi illegali;</li>
          <li>tentare di decompilare, disassemblare o eseguire reverse engineering dell'App;</li>
          <li>interferire o disturbare le funzionalità dell'App o i suoi server;</li>
          <li>utilizzare strumenti automatizzati, bot o script per accedere all'App al di fuori dell'uso normale;</li>
          <li>tentare di aggirare i limiti di utilizzo o i requisiti di abbonamento;</li>
          <li>rivendere, ridistribuire o sfruttare commercialmente l'App o i suoi contenuti;</li>
        </ul>
      ` },
      { h: "9. Contenuti vietati", body: `
        <p>Accetti di non utilizzare l\'App, incluse le sue funzionalità di storie e traduzione tramite IA, per generare, richiedere, archiviare o condividere contenuti che:</p>
        <ul>
          <li>sessualizzino in qualsiasi modo i minori o rappresentino materiale di abuso sessuale su minori (CSAM) — tolleranza zero per questa categoria;</li>
          <li>contengano contenuti sessualmente espliciti, pornografia o nudità grafica;</li>
          <li>promuovano, glorifichino o forniscano istruzioni per violenza, autolesionismo, suicidio o terrorismo;</li>
          <li>promuovano odio, molestie o discriminazione contro qualsiasi individuo o gruppo in base a razza, etnia, religione, genere, orientamento sessuale, disabilità o altra caratteristica protetta;</li>
          <li>forniscano istruzioni per attività illegali, inclusa la produzione di armi, droghe o altre sostanze controllate;</li>
          <li>violino i diritti di proprietà intellettuale, privacy o pubblicità di qualsiasi terza parte;</li>
          <li>siano diffamatori, ingannevoli, fraudolenti o destinati a impersonare un\'altra persona.</li>
        </ul>
        <p>L\'App applica un filtraggio automatico dei contenuti (tramite l\'API di Moderazione di OpenAI) ai vocaboli forniti dall\'utente prima di generare le storie, e i modelli di IA sottostanti sono istruiti a reindirizzare il vocabolario sensibile in contesti neutri ed educativi. Tuttavia, nessun filtro automatico è perfetto.</p>
        <p><strong>Segnalazione:</strong> Se incontri contenuti che ritieni violino questi Termini, segnalali tramite l\'opzione Report nell\'app o via email a <a href="mailto:bukwa.ai@icloud.com">bukwa.ai@icloud.com</a>. Cerchiamo di rispondere alle segnalazioni entro 24 ore.</p>
        <p><strong>Applicazione:</strong> Ci riserviamo il diritto, ma non abbiamo l\'obbligo, di monitorare, esaminare, rimuovere o rifiutare di generare qualsiasi contenuto che violi questi Termini. Gli utenti che violano ripetutamente questa Politica sui Contenuti Vietati potranno avere il loro account sospeso o terminato senza rimborso.</p>
      ` },
      { h: "10. Proprietà intellettuale", body: `
        <h3>9.1 Proprietà dell'App</h3>
        <p>L'App, inclusi design, codice, funzionalità e branding, è proprietà intellettuale dello Sviluppatore ed è protetta dal diritto d'autore e da altre leggi sulla proprietà intellettuale.</p>
        <h3>9.2 Licenza dei contenuti IA</h3>
        <p>Le storie e le traduzioni generate dall'IA prodotte tramite il tuo uso dell'App sono fornite per uso personale e non commerciale. Puoi salvare e condividere le storie generate per il tuo account, ma non puoi distribuirle commercialmente o pubblicarle su larga scala.</p>
      ` },
      { h: "11. Servizi di terze parti", body: `<p>L'App si avvale di servizi di terze parti per la generazione di contenuti IA, l'autenticazione e l'archiviazione dei dati. La disponibilità e le prestazioni di tali servizi sono al di fuori del nostro controllo. Non siamo responsabili di interruzioni, errori o limitazioni causati da servizi di terze parti.</p>` },
      { h: "12. Esclusione di garanzie", body: `<p><strong>L'App è fornita "così com'è" e "come disponibile", senza garanzie di alcun tipo, esplicite o implicite, incluse, a titolo esemplificativo ma non esaustivo, le garanzie implicite di commerciabilità, idoneità per uno scopo particolare e non violazione. Non garantiamo che l'App sarà ininterrotta, priva di errori o sicura.</strong></p>` },
      { h: "13. Limitazione di responsabilità", body: `<p><strong>Nella massima misura consentita dalla legge, lo Sviluppatore non sarà responsabile per danni indiretti, accidentali, speciali, consequenziali o punitivi, né per perdita di profitti, dati o avviamento, derivanti da o in connessione con l'uso dell'App. La nostra responsabilità totale non supererà l'importo che hai pagato per l'App nei dodici (12) mesi precedenti la richiesta.</strong></p>` },
      { h: "14. Disponibilità del servizio", body: `<p>Ci riserviamo il diritto di modificare, sospendere o interrompere l'App o qualsiasi sua parte in qualsiasi momento, con o senza preavviso. In caso di interruzione del servizio, gli abbonati attivi riceveranno un rimborso proporzionale per la parte non utilizzata del loro abbonamento.</p>` },
      { h: "15. Modifiche ai presenti Termini", body: `<p>Possiamo aggiornare questi Termini di tanto in tanto. Ti informeremo delle modifiche sostanziali tramite l'App o con altri mezzi ragionevoli. L'uso continuato dell'App dopo la pubblicazione delle modifiche costituisce la tua accettazione dei Termini revisionati.</p>` },
      { h: "16. Contratto di licenza con l'utente finale", body: `<p>L'uso dell'App è inoltre soggetto al Contratto di licenza standard con l'utente finale (EULA) di Apple, disponibile all'indirizzo <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">apple.com/legal/.../stdeula</a>.</p>` }
    ],

  pl: {
    name: "Polski",
    title: "Warunki świadczenia usług",
    subtitle: "Bukwa — Historie AI do nauki języków",
    updated: "Ostatnia aktualizacja: 2 maja 2026 r.",
    intro: `Niniejsze Warunki świadczenia usług („Warunki") regulują korzystanie przez Ciebie z aplikacji mobilnej Bukwa („Aplikacja") dostarczanej przez Oleksandra („Deweloper", „my", „nas" lub „nasze"). Pobierając, instalując lub korzystając z Aplikacji, wyrażasz zgodę na związanie się niniejszymi Warunkami. Jeśli nie akceptujesz tych Warunków, nie korzystaj z Aplikacji.`,
    sections: [
      { h: "1. Opis usługi", body: `<p>Bukwa to aplikacja do nauki języków, która umożliwia użytkownikom tworzenie słowników, generowanie historii wspieranych przez AI z wbudowanymi glosariuszami, ćwiczenia z fiszkami i tłumaczenie słów za pomocą sztucznej inteligencji. Aplikacja obsługuje ponad 30 języków.</p>` },
      { h: "2. Uprawnienia", body: `<p>Aby korzystać z Aplikacji, musisz mieć ukończone co najmniej 4 lata. Jeśli nie masz ukończonych 18 lat, musisz uzyskać zgodę rodzica lub opiekuna prawnego.</p>` },
      { h: "3. Rejestracja konta", body: `<p>Aby uzyskać dostęp do niektórych funkcji Aplikacji, musisz utworzyć konto za pomocą Apple Sign-In. Jesteś odpowiedzialny za zachowanie poufności danych logowania oraz za wszystkie działania podejmowane na Twoim koncie.</p>` },
      { h: "4. Subskrypcje i zakupy", body: `
        <h3>4.1 Plany subskrypcji</h3>
        <p>Bukwa oferuje automatycznie odnawialne plany subskrypcji, które zapewniają pełny dostęp do funkcji Aplikacji, w tym generowania historii AI, tłumaczeń AI, transkrypcji IPA i powtórek z fiszek. Aktualne ceny i dostępne plany można sprawdzić w Aplikacji oraz na stronie produktu w App Store.</p>
        <h3>4.2 Bezpłatny okres próbny</h3>
        <p>Nowi subskrybenci mogą kwalifikować się do bezpłatnego okresu próbnego. Jeśli nie anulujesz przed zakończeniem okresu próbnego, zostaniesz automatycznie obciążony opłatą za wybrany plan subskrypcji.</p>
        <h3>4.3 Zakupy w aplikacji</h3>
        <p>Bukwa oferuje konsumpcyjne pakiety historii (Story Packs), które zapewniają określoną liczbę kredytów na historie generowane przez AI. Zakup i wykorzystanie pakietów wymaga aktywnej subskrypcji. Jeśli subskrypcja wygasa, niewykorzystane kredyty są zamrażane i ponownie dostępne po wznowieniu subskrypcji. Dopóki subskrypcja jest aktywna, kredyty nie wygasają.</p>
        <h3>4.4 Płatność i odnowienie</h3>
        <p>Płatność jest pobierana z Twojego konta Apple ID przy potwierdzeniu zakupu. Subskrypcje odnawiają się automatycznie, chyba że zostaną anulowane co najmniej 24 godziny przed końcem bieżącego okresu. Twoje konto zostanie obciążone opłatą za odnowienie w ciągu 24 godzin przed końcem bieżącego okresu zgodnie z ceną wybranego planu.</p>
        <h3>4.5 Zarządzanie i anulowanie subskrypcji</h3>
        <p>Możesz zarządzać swoją subskrypcją lub ją anulować w dowolnym momencie poprzez ustawienia konta Apple ID lub App Store. Anulowanie wchodzi w życie pod koniec bieżącego okresu rozliczeniowego. Za niewykorzystaną część okresu subskrypcji nie są przewidziane zwroty.</p>
        <h3>4.6 Zmiany cen</h3>
        <p>Ceny mogą ulec zmianie. Powiadomimy Cię z wyprzedzeniem o wszelkich zmianach cen. Dalsze korzystanie z Aplikacji po zmianie ceny stanowi akceptację nowej ceny.</p>
      ` },
      { h: "5. Limity użytkowania", body: `
        <p>Aby zapewnić uczciwe korzystanie i jakość usługi, Aplikacja stosuje dzienne limity użytkowania funkcji opartych na AI, w tym generowania historii, tłumaczeń i transkrypcji. Aktualne limity są wyświetlane w Aplikacji.</p>
        <p>Limity użytkowania są resetowane 24 godziny po pierwszym użyciu danej funkcji. Na przykład jeśli wygenerujesz pierwszą historię o 20:00, Twój limit historii zostanie zresetowany o 20:00 następnego dnia. Niewykorzystane przydziały nie są przenoszone.</p>
      ` },
      { h: "6. Treści generowane przez AI", body: `
        <h3>6.1 Charakter treści</h3>
        <p>Historie, tłumaczenia i transkrypcje są generowane przez usługi AI stron trzecich. Treści generowane przez AI mogą zawierać nieścisłości, błędy lub nieoczekiwane wyniki. Nie gwarantujemy dokładności, kompletności ani przydatności treści generowanych przez AI do konkretnego celu.</p>
        <h3>6.2 Brak kontroli redakcyjnej</h3>

      ` },
      { h: "11. Сторонние сервисы", body: `<p>Приложение использует сторонние сервисы для генерации ИИ-контента, аутентификации и хранения данных. Доступность и производительность этих сервисов находятся вне нашего контроля. Мы не несём ответственности за любые перерывы, ошибки или ограничения, вызванные сторонними сервисами.</p>` },
      { h: "12. Отказ от гарантий", body: `<p><strong>Приложение предоставляется «как есть» и «как доступно», без каких-либо гарантий, явных или подразумеваемых, включая, но не ограничиваясь, подразумеваемые гарантии товарной пригодности, пригодности для конкретной цели и ненарушения прав. Мы не гарантируем, что Приложение будет работать бесперебойно, без ошибок или безопасно.</strong></p>` },

      { h: "14. Доступность сервиса", body: `<p>Мы оставляем за собой право изменять, приостанавливать или прекращать работу Приложения или любой его части в любое время, с уведомлением или без него. В случае прекращения работы сервиса активные подписчики получат пропорциональный возврат средств за неиспользованную часть подписки.</p>` },
      { h: "15. Изменения настоящих Условий", body: `<p>Мы можем время от времени обновлять данные Условия. О существенных изменениях мы уведомим вас через Приложение или иными разумными способами. Продолжение использования Приложения после публикации изменений означает принятие вами обновлённых Условий.</p>` },

  es: {
    name: "Español",
    title: "Términos del servicio",
    subtitle: "Bukwa — Historias con IA para aprender idiomas",
    updated: "Última actualización: 2 de mayo de 2026",
    intro: `Estos Términos del servicio (los «Términos») regulan el uso que hagas de la aplicación móvil Bukwa (la «App») proporcionada por Oleksandr («Desarrollador», «nosotros», «nos» o «nuestro»). Al descargar, instalar o usar la App, aceptas quedar vinculado por estos Términos. Si no estás de acuerdo con estos Términos, no uses la App.`,
    sections: [
      { h: "1. Descripción del servicio", body: `<p>Bukwa es una aplicación de aprendizaje de idiomas que permite a los usuarios crear vocabularios, generar historias impulsadas por IA con glosarios integrados, practicar con tarjetas de memoria y traducir palabras mediante inteligencia artificial. La App admite más de 30 idiomas.</p>` },
      { h: "2. Elegibilidad", body: `<p>Debes tener al menos 4 años para usar la App. Si eres menor de 18 años, debes contar con el consentimiento de un padre, madre o tutor legal.</p>` },
      { h: "3. Registro de cuenta", body: `<p>Para acceder a determinadas funciones de la App, debes crear una cuenta utilizando Apple Sign-In. Eres responsable de mantener la confidencialidad de las credenciales de tu cuenta y de todas las actividades que se realicen bajo ella.</p>` },
      { h: "4. Suscripciones y compras", body: `
        <h3>4.1 Planes de suscripción</h3>
        <p>Bukwa ofrece planes de suscripción de renovación automática que proporcionan acceso completo a las funciones de la App, incluyendo generación de historias con IA, traducciones con IA, transcripciones IPA y repaso con tarjetas. Los precios actuales y los planes disponibles pueden consultarse en la App y en la página del producto en App Store.</p>
        <h3>4.2 Prueba gratuita</h3>
        <p>Los nuevos suscriptores pueden tener derecho a un período de prueba gratuito. Si no cancelas antes de que termine la prueba, se te cobrará automáticamente el plan de suscripción seleccionado.</p>
        <h3>4.3 Compras dentro de la App</h3>
        <p>Bukwa ofrece Story Packs consumibles que proporcionan un número determinado de créditos para historias generadas por IA. La compra y uso de Story Packs requiere una suscripción activa. Si la suscripción caduca, los créditos no utilizados quedan congelados y vuelven a estar disponibles al renovar la suscripción. Mientras la suscripción esté activa, los créditos no caducan.</p>
        <h3>4.4 Pago y renovación</h3>
        <p>El pago se carga a tu cuenta de Apple ID al confirmar la compra. Las suscripciones se renuevan automáticamente a menos que se cancelen al menos 24 horas antes del final del período en curso. Tu cuenta será cargada por la renovación dentro de las 24 horas previas al final del período en curso al precio del plan seleccionado.</p>
        <h3>4.5 Gestión y cancelación de suscripciones</h3>
        <p>Puedes gestionar o cancelar tu suscripción en cualquier momento a través de los ajustes de tu cuenta de Apple ID o del App Store. La cancelación entra en vigor al final del período de facturación en curso. No se proporcionan reembolsos por la parte no utilizada de un período de suscripción.</p>
        <h3>4.6 Cambios de precio</h3>
        <p>Los precios pueden cambiar. Te notificaremos con antelación cualquier cambio de precio. El uso continuado de la App tras un cambio de precio constituye la aceptación del nuevo precio.</p>
      ` },
      { h: "5. Límites de uso", body: `
        <p>Para garantizar un uso justo y la calidad del servicio, la App aplica límites de uso diarios a las funciones impulsadas por IA, incluyendo la generación de historias, traducciones y transcripciones. Los límites actuales se muestran en la App.</p>
        <p>Los límites de uso se restablecen 24 horas después del primer uso de una función determinada. Por ejemplo, si generas tu primera historia a las 20:00, el límite de historias se restablece a las 20:00 del día siguiente. Las asignaciones no utilizadas no se acumulan.</p>
      ` },
      { h: "6. Contenido generado por IA", body: `
        <h3>6.1 Naturaleza del contenido</h3>
        <p>Las historias, traducciones y transcripciones son generadas por servicios de IA de terceros. El contenido generado por IA puede contener inexactitudes, errores o resultados inesperados. No garantizamos la exactitud, integridad o idoneidad del contenido generado por IA para ningún fin particular.</p>
        <h3>6.2 Sin control editorial</h3>
        <p>No revisamos manualmente cada pieza de contenido generado por IA. Aunque diseñamos prompts y sistemas para producir contenido apropiado y útil, el Desarrollador no es responsable de los resultados específicos generados por los modelos de IA.</p>
        <h3>6.3 Solo para uso educativo</h3>
        <p>El contenido generado por IA está destinado únicamente a fines de aprendizaje de idiomas y no debe considerarse una fuente definitiva de información lingüística, factual o profesional.</p>
      ` },
      { h: "7. Contenido y datos del usuario", body: `
        <h3>7.1 Tus datos</h3>
        <p>Conservas la propiedad de los vocabularios, listas de palabras, historias y otros contenidos que crees dentro de la App. Todo el contenido creado por el usuario se almacena localmente en tu dispositivo.</p>
        <h3>7.2 Datos del lado del servidor</h3>
        <p>La App almacena los siguientes datos en nuestros servidores: tu información de autenticación (nombre y correo electrónico proporcionados a través de Apple Sign-In), el estado de la suscripción, los límites de uso y una caché de traducciones y transcripciones de palabras para mejorar el rendimiento. No almacenamos tus vocabularios, historias ni otros contenidos de aprendizaje en nuestros servidores.</p>
        <h3>7.3 Privacidad</h3>
        <p>El uso que hagas de la App también se rige por nuestra <a href="https://bukwa-ai.github.io/privacy-policy/">Política de privacidad</a>.</p>
        <h3>7.4 Eliminación de datos</h3>
        <p>Tus vocabularios, historias y todo el contenido de aprendizaje se almacenan localmente en tu dispositivo y se eliminan cuando desinstalas la App o los borras manualmente dentro de ella. Para solicitar la eliminación de tus datos del lado del servidor (información de autenticación, estado de la suscripción y límites de uso), contáctanos en <a href="mailto:bukwa.ai@icloud.com">bukwa.ai@icloud.com</a>. Los datos del lado del servidor se eliminarán en un plazo de 30 días desde tu solicitud.</p>
      ` },
      { h: "8. Uso aceptable", body: `
        <p>Te comprometes a no:</p>
        <ul>
          <li>usar la App con fines ilegales;</li>
          <li>intentar realizar ingeniería inversa, descompilar o desensamblar la App;</li>
          <li>interferir con la funcionalidad de la App o sus servidores ni interrumpirla;</li>
          <li>utilizar herramientas automatizadas, bots o scripts para acceder a la App más allá del uso normal;</li>
          <li>intentar eludir los límites de uso o los requisitos de suscripción;</li>
          <li>revender, redistribuir o explotar comercialmente la App o su contenido;</li>
        </ul>
      ` },
      { h: "9. Contenido prohibido", body: `
        <p>Aceptas no utilizar la App, incluidas sus funciones de historias y traducción por IA, para generar, solicitar, almacenar o compartir contenido que:</p>
        <ul>
          <li>sexualice a menores de cualquier manera o represente material de abuso sexual infantil (CSAM) — tolerancia cero para esta categoría;</li>
          <li>contenga contenido sexual explícito, pornografía o desnudez gráfica;</li>
          <li>promueva, glorifique o proporcione instrucciones para violencia, autolesión, suicidio o terrorismo;</li>
          <li>promueva odio, acoso o discriminación contra cualquier persona o grupo por motivos de raza, etnia, religión, género, orientación sexual, discapacidad u otra característica protegida;</li>
          <li>proporcione instrucciones para actividades ilegales, incluida la fabricación de armas, drogas u otras sustancias controladas;</li>
          <li>infrinja los derechos de propiedad intelectual, privacidad o publicidad de terceros;</li>
          <li>sea difamatorio, engañoso, fraudulento o destinado a suplantar la identidad de otra persona.</li>
        </ul>
        <p>La App aplica filtrado automático de contenido (a través de la API de Moderation de OpenAI) a las palabras proporcionadas por el usuario antes de generar historias, y los modelos de IA subyacentes son instruidos para redirigir el vocabulario sensible a contextos neutros y educativos. Sin embargo, ningún filtro automático es perfecto.</p>
        <p><strong>Reporte:</strong> Si encuentras contenido que crees que viola estos Términos, repórtalo mediante la opción Report en la app o por correo electrónico a <a href="mailto:bukwa.ai@icloud.com">bukwa.ai@icloud.com</a>. Procuramos responder a los reportes en un plazo de 24 horas.</p>
        <p><strong>Aplicación:</strong> Nos reservamos el derecho, pero no la obligación, de supervisar, revisar, eliminar o negarnos a generar cualquier contenido que viole estos Términos. Los usuarios que infrinjan repetidamente esta política de Contenido Prohibido podrán ver su cuenta suspendida o cancelada sin reembolso.</p>
      ` },
      { h: "10. Propiedad intelectual", body: `
        <h3>9.1 Propiedad de la App</h3>
        <p>La App, incluyendo su diseño, código, funciones e identidad de marca, es propiedad intelectual del Desarrollador y está protegida por las leyes de derechos de autor y otras leyes de propiedad intelectual.</p>
        <h3>9.2 Licencia del contenido de IA</h3>
        <p>Las historias y traducciones generadas por IA producidas mediante tu uso de la App se proporcionan para tu uso personal y no comercial. Puedes guardar y compartir las historias generadas para tu cuenta, pero no puedes distribuirlas comercialmente ni publicarlas a gran escala.</p>
      ` },
      { h: "11. Servicios de terceros", body: `<p>La App depende de servicios de terceros para la generación de contenido con IA, la autenticación y el almacenamiento de datos. La disponibilidad y el rendimiento de estos servicios están fuera de nuestro control. No somos responsables de las interrupciones, errores o limitaciones causados por servicios de terceros.</p>` },
      { h: "12. Exención de garantías", body: `<p><strong>La App se proporciona «tal cual» y «según disponibilidad», sin garantías de ningún tipo, expresas o implícitas, incluyendo, entre otras, las garantías implícitas de comerciabilidad, idoneidad para un fin particular y no infracción. No garantizamos que la App sea ininterrumpida, esté libre de errores o sea segura.</strong></p>` },
      { h: "13. Limitación de responsabilidad", body: `<p><strong>En la máxima medida permitida por la ley, el Desarrollador no será responsable de ningún daño indirecto, incidental, especial, consecuente o punitivo, ni de la pérdida de beneficios, datos o fondo de comercio, derivados de o en relación con tu uso de la App. Nuestra responsabilidad total no excederá la cantidad que hayas pagado por la App en los doce (12) meses anteriores a la reclamación.</strong></p>` },
      { h: "14. Disponibilidad del servicio", body: `<p>Nos reservamos el derecho de modificar, suspender o discontinuar la App o cualquier parte de ella en cualquier momento, con o sin previo aviso. En caso de discontinuación del servicio, los suscriptores activos recibirán un reembolso prorrateado por la parte no utilizada de su suscripción.</p>` },
      { h: "15. Cambios a estos Términos", body: `<p>Podemos actualizar estos Términos de vez en cuando. Te notificaremos los cambios materiales a través de la App o por otros medios razonables. El uso continuado de la App después de publicarse los cambios constituye tu aceptación de los Términos revisados.</p>` },
      { h: "16. Acuerdo de licencia de usuario final", body: `<p>El uso de la App también está sujeto al Acuerdo de licencia de usuario final estándar (EULA) de Apple, disponible en <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">apple.com/legal/.../stdeula</a>.</p>` }

  ja: {
    name: "日本語",
    title: "利用規約",
    subtitle: "Bukwa — 言語学習のためのAIストーリー",
    updated: "最終更新日：2026年5月2日",
    intro: `本利用規約（「本規約」）は、Oleksandr（「開発者」「当方」「私たち」または「弊社」）が提供するモバイルアプリケーション Bukwa（「本アプリ」）のご利用を規定するものです。本アプリをダウンロード、インストール、または使用することにより、お客様は本規約に拘束されることに同意したものとみなされます。本規約に同意されない場合は、本アプリを使用しないでください。`,
    sections: [
      { h: "1. サービスの説明", body: `<p>Bukwa は、ユーザーが語彙を作成し、組み込みグロッサリー付きの AI 生成ストーリーを生成し、フラッシュカードで練習し、人工知能を使用して単語を翻訳できる言語学習アプリケーションです。本アプリは 30 以上の言語をサポートしています。</p>` },
      { h: "2. 利用資格", body: `<p>本アプリを使用するには、4 歳以上である必要があります。18 歳未満の場合、保護者または法定後見人の同意が必要です。</p>` },
      { h: "3. アカウント登録", body: `<p>本アプリの一部の機能を利用するには、Apple Sign-In を使用してアカウントを作成する必要があります。お客様はアカウント認証情報の機密保持、およびご自身のアカウントで行われるすべての活動について責任を負います。</p>` },
      { h: "4. サブスクリプションと購入", body: `
        <h3>4.1 サブスクリプションプラン</h3>
        <p>Bukwa は自動更新型サブスクリプションプランを提供しており、AI ストーリー生成、AI 翻訳、IPA 転写、フラッシュカード復習を含む本アプリのすべての機能への完全なアクセスを提供します。現在の価格と利用可能なプランは、本アプリ内および App Store の製品ページで確認できます。</p>
        <h3>4.2 無料トライアル</h3>
        <p>新規購読者は無料トライアル期間の対象となる場合があります。トライアル終了前に解約されない場合、選択されたサブスクリプションプランの料金が自動的に請求されます。</p>
        <h3>4.3 アプリ内購入</h3>
        <p>Bukwa は、AI が生成するストーリーのクレジットを定められた数だけ提供する消費型 Story Pack を提供しています。Story Pack の購入と使用にはアクティブなサブスクリプションが必要です。サブスクリプションが期限切れになると、未使用のクレジットは凍結され、再加入時に再び利用可能になります。サブスクリプションがアクティブな間は、クレジットの有効期限は切れません。</p>
        <h3>4.4 支払いと更新</h3>
        <p>支払いは購入確認時に Apple ID アカウントから請求されます。サブスクリプションは現在の期間終了の少なくとも 24 時間前にキャンセルされない限り、自動的に更新されます。更新料は、現在の期間終了前 24 時間以内に、選択されたプランの料金で請求されます。</p>
        <h3>4.5 サブスクリプションの管理とキャンセル</h3>
        <p>サブスクリプションは、Apple ID のアカウント設定または App Store からいつでも管理またはキャンセルできます。キャンセルは現在の請求期間の終了時に有効となります。サブスクリプション期間の未使用部分に対する払い戻しは行われません。</p>
        <h3>4.6 価格の変更</h3>
        <p>価格は変更される場合があります。価格変更については事前にお知らせします。価格変更後も本アプリの使用を継続することは、新価格への同意を意味します。</p>
      ` },
      { h: "5. 利用制限", body: `
        <p>公正な利用とサービス品質を確保するため、本アプリは AI 機能（ストーリー生成、翻訳、転写を含む）に対して 1 日あたりの利用制限を適用します。現在の制限は本アプリ内に表示されます。</p>
        <p>利用制限は、当該機能の最初の使用から 24 時間後にリセットされます。例えば、最初のストーリーを午後 8 時に生成した場合、ストーリー制限は翌日の午後 8 時にリセットされます。未使用の利用枠は繰り越されません。</p>
      ` },
      { h: "6. AI 生成コンテンツ", body: `
        <h3>6.1 コンテンツの性質</h3>
        <p>ストーリー、翻訳、転写は第三者の AI サービスによって生成されます。AI 生成コンテンツには不正確さ、誤り、予期しない結果が含まれる場合があります。当方は AI 生成コンテンツの正確性、完全性、または特定の目的への適合性を保証しません。</p>
        <h3>6.2 編集管理なし</h3>
        <p>当方はすべての AI 生成コンテンツを手動でレビューしているわけではありません。適切で有用なコンテンツを生成するためにプロンプトとシステムを設計していますが、開発者は AI モデルが生成する具体的な出力について責任を負いません。</p>
        <h3>6.3 教育目的のみ</h3>
        <p>AI 生成コンテンツは言語学習の目的のみを意図しており、言語的、事実的、または専門的情報の決定的な情報源として依拠すべきではありません。</p>
      ` },
      { h: "7. ユーザーコンテンツとデータ", body: `
        <h3>7.1 お客様のデータ</h3>
        <p>お客様は本アプリ内で作成した語彙、単語リスト、ストーリー、その他のコンテンツの所有権を保持します。ユーザーが作成したすべてのコンテンツは、お客様のデバイス上にローカルで保存されます。</p>
        <h3>7.2 サーバー側のデータ</h3>
        <p>本アプリは以下のデータを当方のサーバーに保存します：認証情報（Apple Sign-In を通じて提供される名前とメールアドレス）、サブスクリプションの状態、利用制限、およびパフォーマンス向上のための単語の翻訳・転写のキャッシュ。お客様の語彙、ストーリー、その他の学習コンテンツを当方のサーバーには保存しません。</p>

const LANG_CODES = ["en","ua","cs","fr","de","it","pl","ru","es","ja","zh"];

function getLangFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const code = (params.get("lang") || "").toLowerCase();
  return LANGS[code] ? code : "en";
}
function setUrlLang(code) {
  const url = new URL(window.location.href);
  url.searchParams.set("lang", code);
  window.history.replaceState({}, "", url);
}
function render(code) {
  const data = LANGS[code] || LANGS.en;
  document.documentElement.lang = code;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (data[key]) el.textContent = data[key];
  });
  document.getElementById("intro").textContent = data.intro;
  const tos = document.getElementById("tos");
  tos.innerHTML = "";
  data.sections.forEach(s => {
    const sec = document.createElement("section");
    sec.className = "tos";
    const h = document.createElement("h2");
    h.textContent = s.h;
    sec.appendChild(h);
    const body = document.createElement("div");
    body.innerHTML = s.body;
    while (body.firstChild) sec.appendChild(body.firstChild);
    tos.appendChild(sec);
  });
  document.getElementById("contactTitle").textContent = data.contactTitle;
  document.getElementById("contactIntro").textContent = data.contactIntro;
  document.getElementById("labelEmail").textContent = data.labelEmail;
  document.getElementById("labelWebsite").textContent = data.labelWebsite;
  document.getElementById("labelFaq").textContent = data.labelFaq;
}

const select = document.getElementById("langSelect");
LANG_CODES.forEach(c => {
  if (!LANGS[c]) return;
  const opt = document.createElement("option");
  opt.value = c;
  opt.textContent = LANGS[c].name;
  select.appendChild(opt);
});

const initial = getLangFromUrl();
select.value = initial;
render(initial);

select.addEventListener("change", e => {
  const code = e.target.value;
  setUrlLang(code);
  render(code);
});
</script>
